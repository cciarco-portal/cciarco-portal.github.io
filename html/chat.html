<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CCIARCO Copilot Chat</title>
  <style>
    body {
      margin: 0;
      font-family: "Segoe UI", Arial, sans-serif;
      background-color: #1e1e1e;
      color: #f3f3f3;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    #chat-container {
      width: 100%;
      max-width: 700px;
      height: 80vh;
      display: flex;
      flex-direction: column;
      background-color: #2d2d2d;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.5);
      overflow: hidden;
    }

    #chatLog {
      flex: 1;
      padding: 20px;
      overflow-y: auto;
    }

    .message {
      margin: 10px 0;
      padding: 12px 16px;
      border-radius: 10px;
      max-width: 80%;
      line-height: 1.4;
    }

    .user {
      background-color: #0078d4;
      color: #fff;
      align-self: flex-end;
    }

    .ai {
      background-color: #3a3a3a;
      color: #f3f3f3;
      align-self: flex-start;
    }

    #input-area {
      display: flex;
      padding: 12px;
      background-color: #252525;
      border-top: 1px solid #3a3a3a;
    }

    #userInput {
      flex: 1;
      padding: 10px;
      border: none;
      border-radius: 8px;
      outline: none;
      font-size: 14px;
      background-color: #1e1e1e;
      color: #f3f3f3;
    }

    #sendBtn {
      margin-left: 10px;
      padding: 10px 16px;
      border: none;
      border-radius: 8px;
      background-color: #0078d4;
      color: #fff;
      font-size: 14px;
      cursor: pointer;
      transition: background-color 0.2s;
    }

    #sendBtn:hover {
      background-color: #005a9e;
    }
  </style>
</head>
<body>
  <div id="chat-container">
    <div id="chatLog"></div>
    <div id="input-area">
      <input id="userInput" type="text" placeholder="Ask Copilot..." />
      <button id="sendBtn" onclick="sendMessage()">Send</button>
    </div>
  </div>

  <script src="../js/index.js"></script>
</body>
</html>
