<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CCIARCO Copilot Chat</title>
  <style>
    body { margin:0; font-family:Segoe UI,Arial,sans-serif; background:#1e1e1e; color:#f3f3f3; }
    #chat-container { max-width:700px; margin:40px auto; background:#2d2d2d; border-radius:12px; overflow:hidden; display:flex; flex-direction:column; height:80vh; }
    #chatLog { flex:1; padding:20px; overflow-y:auto; }
    .message { margin:10px 0; padding:12px 16px; border-radius:10px; max-width:80%; line-height:1.4; }
    .user { background:#0078d4; color:#fff; align-self:flex-end; }
    .ai { background:#3a3a3a; color:#f3f3f3; align-self:flex-start; }
    #input-area { display:flex; padding:12px; background:#252525; border-top:1px solid #3a3a3a; }
    #userInput { flex:1; padding:10px; border:none; border-radius:8px; background:#1e1e1e; color:#f3f3f3; }
    #sendBtn { margin-left:10px; padding:10px 16px; border:none; border-radius:8px; background:#0078d4; color:#fff; cursor:pointer; }
    #sendBtn:hover { background:#005a9e; }
  </style>
</head>
<body>
  <div id="chat-container">
    <div id="chatLog"></div>
    <div id="input-area">
      <input id="userInput" type="text" placeholder="Ask Copilot..." />
      <button id="sendBtn" onclick="sendMessage()">Send</button>
    </div>
  </div>
  <script src="../js/index.js"></script>
</body>
</html>
