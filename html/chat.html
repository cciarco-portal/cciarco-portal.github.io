<!DOCTYPE html>
<html>
<head>
  <title>CCIARCO Chatbox</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; }
    #chatbox { max-width: 600px; margin: auto; }
    #chatLog { border: 1px solid #ccc; padding: 10px; min-height: 200px; margin-top: 10px; }
    input { width: 80%; padding: 8px; }
    button { padding: 8px; }
  </style>
</head>
<body>
  <div id="chatbox">
    <input id="userInput" type="text" placeholder="Type your message..." />
    <button onclick="sendMessage()">Send</button>
    <div id="chatLog"></div>
  </div>

  <script>
    async function sendMessage() {
      const message = document.getElementById("userInput").value;
      const reply = await getAIResponse(message);
      document.getElementById("chatLog").innerHTML += `<p><b>User:</b> ${message}</p><p><b>AI:</b> ${reply}</p>`;
      document.getElementById("userInput").value = "";
    }

    async function getAIResponse(message) {
      // Replace this URL with your Firebase Function endpoint after deployment
      const response = await fetch("https://us-central1-cciarco-portal.cloudfunctions.net/api/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message })
      });
      const data = await response.json();
      return data.reply;
    }
  </script>
</body>
</html>
