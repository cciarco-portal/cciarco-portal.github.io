<!DOCTYPE html>
<html>
<head>
  <title>CCIARCO AI Chatbox</title>
  <style>
    #chatbox { width: 400px; height: 500px; border: 1px solid #ccc; overflow-y: scroll; padding: 10px; }
    .message { margin: 5px; padding: 8px; border-radius: 5px; }
    .user { background: #0288D1; color: white; text-align: right; }
    .ai { background: #f1f1f1; color: black; text-align: left; }
  </style>
</head>
<body>
  <div id="chatbox"></div>
  <input type="text" id="userInput" placeholder="Type your message..." />
  <button onclick="sendMessage()">Send</button>

  <script>
    async function sendMessage() {
      const input = document.getElementById("userInput").value;
      const chatbox = document.getElementById("chatbox");

      chatbox.innerHTML += `<div class="message user">${input}</div>`;

      const response = await fetch("/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message: input })
      });
      const data = await response.json();

      chatbox.innerHTML += `<div class="message ai">${data.reply}</div>`;
      document.getElementById("userInput").value = "";
    }
  </script>
</body>
</html>
